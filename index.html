        <script>
            // Load data dari localStorage saat startup
            let history = JSON.parse(localStorage.getItem("remi_history") || "[]");

            // Jalankan fungsi update tampilan pertama kali
            renderData();

            function addRound() {
                const players = ['p1', 'p2', 'p3', 'p4'];
                const newRound = {};

                players.forEach(p => {
                    const input = document.getElementById(p);
                    newRound[p] = parseInt(input.value) || 0;
                    input.value = ''; // Reset input
                });

                history.push(newRound);
                saveAndRender();
                document.getElementById('p1').focus(); // Balik ke P1
            }

            function renderData() {
                const body = document.getElementById('score-body');
                body.innerHTML = '';
                
                let totals = { p1: 0, p2: 0, p3: 0, p4: 0 };

                history.forEach((round, index) => {
                    const row = `
                        <tr class="text-center text-sm font-medium hover:bg-zinc-800/30 transition-colors">
                            <td class="py-3 text-zinc-600 text-xs">${index + 1}</td>
                            <td class="py-3">${round.p1}</td>
                            <td class="py-3">${round.p2}</td>
                            <td class="py-3">${round.p3}</td>
                            <td class="py-3">${round.p4}</td>
                        </tr>
                    `;
                    body.insertAdjacentHTML('beforeend', row);
                    
                    // Akumulasi total
                    totals.p1 += round.p1;
                    totals.p2 += round.p2;
                    totals.p3 += round.p3;
                    totals.p4 += round.p4;
                });

                // Update Footer
                document.getElementById('t1').innerText = totals.p1;
                document.getElementById('t2').innerText = totals.p2;
                document.getElementById('t3').innerText = totals.p3;
                document.getElementById('t4').innerText = totals.p4;
            }

            function saveAndRender() {
                localStorage.setItem("remi_history", JSON.stringify(history));
                renderData();
            }

            function resetGame() {
                if (confirm("Reset papan skor? Semua data akan dihapus.")) {
                    history = [];
                    saveAndRender();
                }
            }
        </script>
